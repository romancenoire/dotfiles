$terminal = kitty
$fileManager = thunar
$menu = vicinae toggle
$logout = pkill wlogout || wlogout -l ~/.config/wlogout/layout -b 4

$games = steam_app_.*|steam_proton|streaming_client|gamescope

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

env = TERMINAL, kitty
env = GTK_THEME, adw-gtk3-dark
env = QT_QPA_PLATFORMTHEME,qt5ct

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = GBM_BACKEND, nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = LIBVA_DRIVER_NAME, nvidia
env = __GL_GSYNC_ALLOWED, 0
env = __GL_VRR_ALLOWED, 0
env = WLR_RENDERER_ALLOW_SOFTWARE, 1
env = NVD_BACKEND,direct
