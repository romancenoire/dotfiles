general {
    gaps_in = 4
    gaps_out = 16
    border_size = 1
    col.active_border = rgba(595959dd)
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 0.90
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
	    new_optimizations = true
        vibrancy = 0.1696
    }
}

# Program specific visual rules
layerrule = blur on, match:namespace waybar

layerrule = blur on, match:namespace vicinae
layerrule = ignore_alpha 0.0, match:namespace vicinae

layerrule = no_anim on, match:namespace hyprpicker
layerrule = no_anim on, match:namespace selection

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = blur on, match:namespace swaync

layerrule = ignore_alpha 0.0, match:namespace swaync-control-center
layerrule = ignore_alpha 0.0, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.0, match:namespace swaync

layerrule = animation appleEase, match:namespace swaync-control-center

layerrule = ignore_alpha 0.0, match:namespace logout_dialog 
layerrule = blur on, match:namespace logout_dialog 

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

master {
    new_status = master
}
